site_name: SWIFT
site_description: "SHAP-Weighted Impact Feature Testing for Model-Aware Distribution Monitoring"
site_url: https://wlazlod.github.io/swift/
repo_url: https://github.com/wlazlod/swift
repo_name: wlazlod/swift

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - The SWIFT Pipeline: user-guide/pipeline.md
    - Visualization: user-guide/visualization.md
    - Configuration: user-guide/configuration.md
    - scikit-learn Integration: user-guide/sklearn-integration.md
  - API Reference:
    - api/index.md
    - SWIFTMonitor: api/pipeline.md
    - Types: api/types.md
    - Extraction: api/extraction.md
    - Bucketing: api/bucketing.md
    - Normalization: api/normalization.md
    - Distance: api/distance.md
    - Threshold: api/threshold.md
    - Aggregation: api/aggregation.md
    - Plotting: api/plotting.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            docstring_section_style: spacy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wlazlod/swift
